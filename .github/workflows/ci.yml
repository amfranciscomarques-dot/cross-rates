name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (core + web + dev tooling)
        run: pip install -e ".[dev,web]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Type-check core + service + feeds (mypy --strict)
        run: mypy

      - name: Tests (pytest + coverage)
        run: pytest

  # Valida que a imagem do frontend web constrói (sem publicar). Não há passo de
  # deploy: o alojamento fica em aberto, a imagem é portável (ver Dockerfile).
  docker:
    runs-on: ubuntu-latest
    needs: checks
    steps:
      - uses: actions/checkout@v4

      - name: Build web image
        run: docker build -t cross-rates-web:ci .

      - name: Smoke-test the image (page serves a 200)
        run: |
          # Feed "simulado": determinístico e offline, sem depender da API externa.
          docker run -d --name crweb -p 8000:8000 -e CROSS_RATES_FEED=simulado cross-rates-web:ci
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8000/ >/dev/null; then
              echo "served OK"; docker rm -f crweb; exit 0
            fi
            sleep 1
          done
          echo "web image did not serve in time"; docker logs crweb; docker rm -f crweb; exit 1
